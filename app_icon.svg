<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121212" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <!-- Electric Yellow/Green Gradient for the main mark -->
    <linearGradient id="electricGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4FF00" />
      <stop offset="50%" stop-color="#E5FF33" />
      <stop offset="100%" stop-color="#00E676" />
    </linearGradient>

    <!-- Drop Shadow for depth -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />

  <!-- Abstract Mountain / Data Spike (Peak) -->
  <path d="M120 380 L220 220 L280 280 L380 120 L420 160 L320 340 L260 280 L180 400 Z" 
        fill="url(#electricGradient)" 
        filter="url(#glow)"/>

  <!-- Fluid Data Line (Flow) -->
  <path d="M100 280 Q 150 200 240 250 T 400 200" 
        fill="none" 
        stroke="#00E676" 
        stroke-width="16" 
        stroke-linecap="round"
        style="opacity: 0.8"/>
        
  <!-- Subtle accent dot (The 'Peak') -->
  <circle cx="380" cy="120" r="16" fill="#FFFFFF" />

</svg>
